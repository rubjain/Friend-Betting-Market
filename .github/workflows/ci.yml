name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run prisma:validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agora_ci
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/agora_ci
      - run: npm test
      - run: npm run build
